apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-proxy-config
data:
  ADDR: ":3001"
  CONFIG_PATH: "/app/config.json"
---
apiVersion: v1
kind: Secret
metadata:
  name: nvidia-proxy-secrets
type: Opaque
stringData:
  # Replace with your actual NVIDIA API key
  PROVIDER_API_KEY: "your-nvidia-api-key"
  # Optional: Set a server API key for inbound auth
  SERVER_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvidia-proxy
  labels:
    app: nvidia-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nvidia-proxy
  template:
    metadata:
      labels:
        app: nvidia-proxy
    spec:
      containers:
        - name: nvidia-proxy
          image: ghcr.io/zhangrr/claude-nvidia-proxy:latest
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: ADDR
              valueFrom:
                configMapKeyRef:
                  name: nvidia-proxy-config
                  key: ADDR
            - name: CONFIG_PATH
              valueFrom:
                configMapKeyRef:
                  name: nvidia-proxy-config
                  key: CONFIG_PATH
            - name: PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nvidia-proxy-secrets
                  key: PROVIDER_API_KEY
            - name: SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nvidia-proxy-secrets
                  key: SERVER_API_KEY
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nvidia-proxy
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: nvidia-proxy
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nvidia-proxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nvidia-proxy
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
